<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>扫码登录 - 蓝信</title>
    <style>
        body {
            background-color: #f0f2f5;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: -apple-system, sans-serif;
        }
        .login-card {
            background: white;
            padding: 40px;
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.1);
            text-align: center;
            width: 360px;
        }
        h2 { margin-bottom: 20px; color: #333; }
        
        /* 二维码区域 */
        .qr-container {
            width: 200px;
            height: 200px;
            background: #f5f5f5;
            margin: 0 auto 20px auto;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid #eee;
            position: relative;
        }
        .qr-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        
        /* 状态提示 */
        .status-text {
            color: #666;
            font-size: 14px;
            margin-bottom: 10px;
        }
        .loading { color: #1890ff; }
        .success { color: #52c41a; }

        .footer {
            margin-top: 20px;
            font-size: 12px;
            color: #999;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <h2>蓝信扫码登录</h2>
        
        <div class="qr-container">
            <!-- 这里显示二维码 -->
            <img id="qrImage" class="qr-img" style="display:none;" alt="二维码加载失败" />
            <span id="qrLoader">加载中...</span>
        </div>
        
        <div id="statusMsg" class="status-text">请使用蓝信 APP 扫码登录</div>

        <div class="footer">
            安全认证系统
        </div>
    </div>

    <script>
        // 【重要】请修改为你的 Cloudflare Worker 地址
        const WORKER_API_URL = 'https://lanxin-backend.zhb6636.workers.dev'; 

        let pollTimer = null;
        let currentTicket = null;

        // 页面加载即执行
        window.onload = function() {
            if (WORKER_API_URL.includes('zhb6636')) {
                alert('请先修改代码中的 WORKER_API_URL 为真实地址');
                return;
            }
            fetchQRCode();
        };

        // 1. 获取二维码
        async function fetchQRCode() {
            try {
                const res = await fetch(`${WORKER_API_URL}/get_qr`);
                const data = await res.json();

                console.log("二维码数据:", data);

                if (data.qr_code) {
                    // 显示二维码
                    const img = document.getElementById('qrImage');
                    img.src = data.qr_code; 
                    img.style.display = 'block';
                    document.getElementById('qrLoader').style.display = 'none';
                    
                    currentTicket = data.ticket;
                    
                    // 开始轮询检查状态
                    startPolling();
                } else {
                    document.getElementById('statusMsg').innerText = '获取二维码失败: ' + (data.error || '未知错误');
                    document.getElementById('statusMsg').className = 'status-text error';
                }
            } catch (err) {
                console.error(err);
                document.getElementById('statusMsg').innerText = '网络错误，请检查 WORKER_API_URL';
            }
        }

        // 2. 轮询检查扫码状态
        function startPolling() {
            pollTimer = setInterval(async () => {
                if (!currentTicket) return;

                try {
                    const res = await fetch(`${WORKER_API_URL}/check_status`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ticket: currentTicket })
                    });
                    const data = await res.json();
                    
                    console.log("状态检查:", data);

                    // 【重要】这里的状态码判断需要根据蓝信文档调整
                    // 常见状态: waiting(未扫), scanned(已扫), confirmed/complete(成功), expired(过期)
                    if (data.status === 'confirmed' || data.status === 'complete' || data.code === 0) {
                        clearInterval(pollTimer);
                        handleLoginSuccess(data);
                    } else if (data.status === 'expired') {
                        clearInterval(pollTimer);
                        document.getElementById('statusMsg').innerText = '二维码已过期，请刷新页面';
                    } else if (data.status === 'scanned') {
                        document.getElementById('statusMsg').innerText = '已扫描，请在手机上确认';
                        document.getElementById('statusMsg').className = 'status-text loading';
                    }

                } catch (err) {
                    console.error("轮询错误", err);
                }
            }, 2000); // 每2秒问一次
        }

        // 3. 登录成功
        function handleLoginSuccess(userInfo) {
            document.getElementById('statusMsg').innerText = '登录成功，正在跳转...';
            document.getElementById('statusMsg').className = 'status-text success';
            
            // 这里可以保存 token 或跳转
            setTimeout(() => {
                // window.location.href = '/welcome.html';
                alert('登录成功！用户信息：' + JSON.stringify(userInfo));
            }, 1000);
        }
    </script>
</body>
</html>
