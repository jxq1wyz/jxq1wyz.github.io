<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">

    <title>微信唤起工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            text-align: center;
            max-width: 400px;
            width: 100%;
        }

        h1 {
            color: #fff;
            font-size: 24px;
            margin-bottom: 40px;
            font-weight: 500;
        }

        .btn-group {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .btn {
            padding: 16px 32px;
            font-size: 16px;
            font-weight: 500;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            outline: none;
        }

        .btn-mobile {
            background: linear-gradient(135deg, #07c160 0%, #06ad56 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(7, 193, 96, 0.3);
        }

        .btn-mobile:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(7, 193, 96, 0.4);
        }

        .btn-mobile:active {
            transform: translateY(0);
        }

        .btn-pc {
            background: linear-gradient(135deg, #5765b2 0%, #4251a3 100%);
            color: #fff;
            box-shadow: 0 4px 15px rgba(87, 101, 178, 0.3);
        }

        .btn-pc:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(87, 101, 178, 0.4);
        }

        .btn-pc:active {
            transform: translateY(0);
        }

        .label {
            color: rgba(255, 255, 255, 0.6);
            font-size: 12px;
            margin-bottom: 8px;
        }

        .info {
            margin-top: 40px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            text-align: left;
        }

        .info h3 {
            color: #fff;
            font-size: 14px;
            margin-bottom: 12px;
        }

        .info p {
            color: rgba(255, 255, 255, 0.7);
            font-size: 12px;
            line-height: 1.6;
            margin-bottom: 8px;
        }

        .info code {
            background: rgba(0, 0, 0, 0.3);
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Monaco', 'Consolas', monospace;
            font-size: 11px;
            color: #07c160;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>微信唤起工具</h1>

        <div class="btn-group">
            <div>
                <div class="label">移动端</div>
                <button class="btn btn-mobile" onclick="openWechatMobile()">
                    打开手机微信
                </button>
            </div>

            <div>
                <div class="label">桌面端</div>
                <button class="btn btn-pc" onclick="openWechatPC()">
                    打开电脑微信
                </button>
            </div>
        </div>

        <div class="info">
            <h3>支持的微信功能：</h3>
            <p><code>weixin://</code> - 打开微信</p>
            <p><code>weixin://dl/scan</code> - 扫一扫</p>
            <p><code>weixin://dl/moments</code> - 朋友圈</p>
            <p><code>weixin://dl/shake</code> - 摇一摇</p>
            <p><code>weixin://dl/settings</code> - 设置</p>
        </div>
    </div>

    <script>
        // 检测设备类型
        function detectDevice() {
            const userAgent = navigator.userAgent || navigator.vendor || window.opera;
            return /android|webos|iphone|ipad|ipod|blackberry|iemobile|opera mini/i.test(userAgent)
                ? 'mobile'
                : 'desktop';
        }

        // 手机端唤起微信
        function openWechatMobile() {
            // iOS Safari 或 Android 浏览器
            window.location.href = 'weixin://dl/scan';

            // 延迟跳转 App Store（如果微信未安装）
            setTimeout(function() {
                // 尝试判断是否成功唤起
                // 这里可以根据实际情况调整 App Store 链接
                const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
                if (isIOS) {
                    // iOS 跳转 App Store 微信下载页
                    window.location.href = 'https://apps.apple.com/cn/app/wechat/id414478124';
                } else {
                    // Android 跳转应用商店
                    window.location.href = 'https://weixin.qq.com/cgi-bin/readtemplate?lang=zh_CN&t=weixin_faq_list';
                }
            }, 2000);
        }

        // PC端打开微信
        function openWechatPC() {
            // Windows 系统
            if (navigator.platform.indexOf('Win') !== -1) {
                // 尝试使用 Windows 协议唤起微信
                window.location.href = 'weixin://';

                // 如果失败，尝试打开本地微信客户端
                setTimeout(function() {
                    // 尝试通过 href 点击触发
                    const a = document.createElement('a');
                    a.href = 'weixin://';
                    a.click();
                }, 500);
            }
            // macOS 系统
            else if (navigator.platform.indexOf('Mac') !== -1) {
                window.location.href = 'weixin://';
            }
            // 其他系统
            else {
                alert('当前系统暂不支持自动打开微信，请手动打开。');
            }
        }

        // 页面加载时根据设备类型显示不同提示
        window.onload = function() {
            const device = detectDevice();
            if (device === 'mobile') {
                console.log('移动端设备');
            } else {
                console.log('桌面端设备');
            }
        };
    </script>

        x: rect.x,
        y: rect.y
      },
      selector: selector,
      text: text,
      attributes: attributes,
      url: window.location.href,
      path: window.location.pathname,
      timestamp: Date.now()
    };
    try {
      window.parent.postMessage({
        type: "iframe-element-click",
        data: elementInfo,
        source: "iframe-highlight-injector"
      }, "*");
    } catch (error) {
      console.warn("无法发送消息到父窗口:", error);
    }
  }

  // 监听来自父窗口的消息
  function handleParentMessage(event) {
    console.log("Received message from parent:", event.data);
    if (event.data.type === "iframe-highlight-toggle") {
      var enabled = event.data.enabled;
      console.log("Highlight toggle:", enabled);
      if (enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "enable-iframe-highlight") {
      console.log("Enable iframe highlight");
      enableHighlight();
    } else if (event.data.type === "disable-iframe-highlight") {
      console.log("Disable iframe highlight");
      disableHighlight();
    } else if (event.data.type === "toggle-iframe-highlight") {
      var _enabled = event.data.enabled !== undefined ? event.data.enabled : !highlightEnabled;
      console.log("Toggle iframe highlight to:", _enabled);
      if (_enabled) {
        enableHighlight();
      } else {
        disableHighlight();
      }
    } else if (event.data.type === "update-selected-element") {
      var selector = event.data.selector;
      console.log("Update selected element with selector:", selector);
      if (selector) {
        try {
          var element = document.querySelector(selector);
          console.log("Found element by selector:", element);
          updateSelectedHighlight(element);
        } catch (error) {
          console.warn("Failed to select element:", error);
          updateSelectedHighlight(null);
        }
      } else {
        updateSelectedHighlight(null);
      }
    } else if (event.data.type === "clear-selected-element") {
      console.log("Clear selected element");
      updateSelectedHighlight(null);
    }
  }

  // 启用高亮功能
  function enableHighlight() {
    console.log("Enabling highlight");
    document.addEventListener("mouseover", handleMouseOver, true);
    document.addEventListener("mouseout", handleMouseOut, true);
    document.addEventListener("click", handleClick, true);
    highlightEnabled = true;
    overlay.style.display = "block";
  }

  // 禁用高亮功能
  function disableHighlight() {
    console.log("Disabling highlight");
    highlightEnabled = false;
    // 保持事件监听器，但通过 highlightEnabled 变量控制行为
    // 这样可以保留选中状态的显示
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    // 不隐藏 selectedBox 和 selectedLabel，保留选中状态
  }

  // 完全禁用高亮功能（移除所有监听器）
  function fullyDisableHighlight() {
    console.log("Fully disabling highlight");
    highlightEnabled = false;
    document.removeEventListener("mouseover", handleMouseOver, true);
    document.removeEventListener("mouseout", handleMouseOut, true);
    document.removeEventListener("click", handleClick, true);
    overlay.style.display = "none";
    highlightBox.style.display = "none";
    tagLabel.style.display = "none";
    selectedBox.style.display = "none";
    selectedLabel.style.display = "none";
  }

  // 添加事件监听
  enableHighlight();
  window.addEventListener("message", handleParentMessage);

  // 暴露全局函数供外部调用
  window.__iframeHighlightControl = {
    enable: enableHighlight,
    disable: disableHighlight,
    fullyDisable: fullyDisableHighlight,
    isEnabled: function isEnabled() {
      return highlightEnabled;
    },
    getSelectedElement: function getSelectedElement() {
      return selectedElement;
    },
    updateSelected: updateSelectedHighlight,
    // 通过消息发送开关控制
    sendToggleMessage: function sendToggleMessage(enabled) {
      window.parent.postMessage({
        type: 'iframe-highlight-status',
        enabled: enabled || highlightEnabled,
        source: 'iframe-highlight-injector'
      }, '*');
    }
  };

  // 通知父窗口脚本已加载
  try {
    window.parent.postMessage({
      type: "iframe-highlight-ready",
      data: {
        url: window.location.href,
        userAgent: navigator.userAgent,
        timestamp: Date.now()
      },
      source: "iframe-highlight-injector"
    }, "*");
  } catch (error) {
    console.warn("无法发送就绪消息到父窗口:", error);
  }

  // 清理函数
  window.__iframeHighlightCleanup = function () {
    fullyDisableHighlight();
    window.removeEventListener("message", handleParentMessage);
    if (overlay.parentElement) {
      overlay.parentElement.removeChild(overlay);
    }
    delete window.__iframeHighlightInitialized;
    delete window.__iframeHighlightCleanup;
  };
})();

</script>
</body>
</html>
