<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>唤 起 WPS</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f0f0f0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        .btn {
            display: block;
            padding: 15px 40px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #d63031; /* WPS 红 */
            border-radius: 8px;
            text-decoration: none;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            text-align: center;
        }
        .btn:active {
            background-color: #b71c1c;
        }
        p {
            color: #666;
            font-size: 12px;
            margin-top: 20px;
            text-align: center;
        }
    </style>
</head>
<body>

    <!-- 
       为了在微信内不被拦截，请使用 https:// 开头的通用链接。
       下面是一个示例链接，指向 WPS 的在线文档分享页。
       如果你有具体的 WPS 分享链接，请替换 href 中的内容。
    -->
    <a href="https://kdocs.cn/l/sample" class="btn">打开 WPS Office</a>
    
    <p>点击按钮将通过通用链接唤起 WPS<br>（不被微信拦截）</p>

</body>
</html>
