<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>打开 WPS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex; align-items: center; justify-content: center;
      min-height: 100vh; background: #f5f5f5; padding: 20px;
    }
    .btn {
      width: 100%; max-width: 320px;
      padding: 16px 24px;
      background: #2684ff; color: #fff;
      border: none; border-radius: 12px;
      font-size: 17px; font-weight: 600;
      box-shadow: 0 4px 12px rgba(38,132,255,0.3);
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .btn:active { transform: scale(0.98); }
    
    /* 微信引导层 */
    .guide {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.85); z-index: 9999;
      display: none; align-items: center; justify-content: center;
      padding: 20px;
    }
    .guide.show { display: flex; }
    .guide-box {
      background: #fff; border-radius: 16px; padding: 24px;
      max-width: 300px; text-align: center; animation: pop 0.3s ease;
    }
    @keyframes pop { from { transform: scale(0.9); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .guide-icon { font-size: 48px; margin-bottom: 12px; }
    .guide-text { color: #333; font-size: 15px; line-height: 1.5; margin: 12px 0; }
    .guide-step { 
      background: #f8f9fa; border-radius: 8px; padding: 12px; 
      margin: 10px 0; text-align: left; font-size: 14px; color: #555;
    }
    .guide-close {
      margin-top: 16px; padding: 10px 24px;
      background: #007aff; color: #fff; border: none;
      border-radius: 8px; font-size: 15px; cursor: pointer;
    }
  </style>
</head>
<body>
  <button class="btn" id="openWPS">📄 打开 WPS Office</button>
  
  <!-- 微信引导弹窗 -->
  <div class="guide" id="wechatGuide">
    <div class="guide-box">
      <div class="guide-icon">🔐</div>
      <div class="guide-text">微信暂不支持直接唤起外部应用</div>
      <div class="guide-step">
        1️⃣ 点击右上角 <strong>···</strong><br>
        2️⃣ 选择「<strong>在浏览器中打开</strong>」<br>
        3️⃣ 重新点击按钮即可唤起 WPS
      </div>
      <button class="guide-close" id="guideClose">知道了</button>
    </div>
  </div>

  <script>
    // 检测是否在微信环境
    const isWechat = /MicroMessenger/i.test(navigator.userAgent);
    const isIOS = /iPhone|iPad|iPod/i.test(navigator.userAgent);
    
    const openWPS = () => {
      // 1. 优先尝试直接唤起（非微信环境有效）
      window.location.href = 'KingsoftOfficeApp://';
      
      // 2. 降级处理：2 秒后若页面仍可见，说明唤起失败
      setTimeout(() => {
        if (document.visibilityState !== 'hidden') {
          // 微信内：显示引导
          if (isWechat && isIOS) {
            document.getElementById('wechatGuide').classList.add('show');
          } else {
            // 其他环境：跳转 App Store（可选）
            // window.location.href = 'https://apps.apple.com/app/id599852710';
          }
        }
      }, 2000);
    };

    // 绑定按钮事件（确保用户主动点击）
    document.getElementById('openWPS').addEventListener('click', (e) => {
      e.preventDefault();
      openWPS();
    });
    
    // 关闭引导弹窗
    document.getElementById('guideClose').addEventListener('click', () => {
      document.getElementById('wechatGuide').classList.remove('show');
    });
    
    // 点击引导层背景也可关闭
    document.getElementById('wechatGuide').addEventListener('click', (e) => {
      if (e.target.id === 'wechatGuide') {
        document.getElementById('wechatGuide').classList.remove('show');
      }
    });
  </script>
</body>
</html>
