<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>蓝信单点登录 Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .badge {
      display: inline-block;
      background: #f0f2f5;
      color: #555;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin: 2px;
    }

    #login-area {
      margin: 30px 0;
    }
    #qrauth-container {
      width: 300px;
      height: 320px;
      margin: 0 auto;
      border: 1px solid #eee;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
    }
    .loading { color: #666; font-size: 14px; }

    #user-panel {
      display: none;
      text-align: left;
      padding: 20px;
      background: #f8f9ff;
      border-radius: 12px;
      margin-top: 20px;
    }
    #user-panel.show { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .user-header {
      display: flex;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px dashed #ddd;
      margin-bottom: 15px;
    }
    .user-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-right: 15px;
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-header-info {
      flex: 1;
      text-align: left;
    }
    .user-header-name {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
    }
    .user-header-org {
      font-size: 13px;
      color: #666;
    }

    .user-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed #eee;
    }
    .user-row:last-child { border-bottom: none; }
    .user-label {
      width: 80px;
      color: #666;
      font-size: 14px;
    }
    .user-value {
      flex: 1;
      color: #333;
      font-weight: 500;
      font-size: 14px;
      text-align: left;
      word-break: break-all;
    }

    .status-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
      background: #d4edda;
      color: #155724;
    }

    .btn {
      display: inline-block;
      background: #667eea;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 15px;
      transition: background 0.2s;
    }
    .btn:hover { background: #5568d3; }
    .btn-outline {
      background: transparent;
      border: 1px solid #667eea;
      color: #667eea;
    }
    .btn-outline:hover { background: #f0f2ff; }

    #status {
      margin-top: 15px;
      font-size: 13px;
      min-height: 20px;
    }
    .status-error { color: #e74c3c; }
    .status-success { color: #27ae60; }
  </style>
</head>
<body>
  <div class="container">
    <h1>蓝信单点登录 Demo</h1>
    <div class="subtitle">
      <span class="badge">GitHub Pages</span>
      <span class="badge">HTTPS</span>
      <span class="badge">腾讯云函数</span>
    </div>

    <div id="login-area">
      <div id="qrauth-container">
        <div class="loading">正在加载二维码...</div>
      </div>
      <div id="status"></div>
    </div>

    <div id="user-panel">
      <div class="user-header">
        <div class="user-avatar" id="user-avatar-icon">?</div>
        <img id="user-avatar-img" src="" alt="头像" style="display: none;">
        <div class="user-header-info">
          <div class="user-header-name" id="user-name">-</div>
          <div class="user-header-org" id="user-org">-</div>
        </div>
      </div>

      <div class="user-row">
        <span class="user-label">人员ID</span>
        <span class="user-value" id="user-id">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">组织</span>
        <span class="user-value" id="user-orgname">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">部门</span>
        <span class="user-value" id="user-dept">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">手机</span>
        <span class="user-value" id="user-mobile">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">邮箱</span>
        <span class="user-value" id="user-email">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">员工号</span>
        <span class="user-value" id="user-employee">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">登录名</span>
        <span class="user-value" id="user-loginname">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">状态</span>
        <span class="user-value" id="user-status">-</span>
      </div>

      <button class="btn btn-outline" onclick="logout()" style="width: 100%; margin-top: 20px;">重新登录</button>
    </div>

    <div style="margin-top: 30px;">
      <button class="btn" onclick="location.reload()">刷新页面</button>
    </div>
  </div>

  <script src="https://user-stage.e.lanxin.cn/user/passport/qrauth/static/login-jssdk.js"></script>

  <script>
    const BACKEND_URL = 'https://1422359745-233asqikpd.ap-guangzhou.tencentscf.com';

    const LANXIN_CONFIG = {
      oauthUrl: 'https://user-stage.e.lanxin.cn/user/passport/qrauth',
      appId: 9183488,
      orgId: 14803712,
      redirectUri: window.location.href.split('?')[0]
    };

    const statusEl = document.getElementById('status');
    const loginArea = document.getElementById('login-area');
    const userPanel = document.getElementById('user-panel');

    function showStatus(msg, type = 'info') {
      statusEl.textContent = msg;
      statusEl.className = type === 'error' ? 'status-error' :
                          type === 'success' ? 'status-success' : '';
    }

    function getAvatarPlaceholder(name) {
      if (!name) return '?';
      return name.charAt(0).toUpperCase();
    }

    function initLanxinLogin() {
      if (typeof LxLogin !== 'function') {
        showStatus('蓝信 SDK 加载失败', 'error');
        return;
      }

      const container = document.getElementById('qrauth-container');
      container.innerHTML = '';

      LxLogin({
        oauthUrl: LANXIN_CONFIG.oauthUrl,
        appId: LANXIN_CONFIG.appId,
        orgId: LANXIN_CONFIG.orgId,
        redirectUri: LANXIN_CONFIG.redirectUri,
        containerId: 'qrauth-container',
        success: async function(res) {
          const { code } = res;
          showStatus('正在验证登录...', 'info');

          try {
            const response = await fetch(BACKEND_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ code })
            });

            const result = await response.json();
            console.log('后端返回:', result);

            if (result.success) {
              displayUserInfo(result.user);
              loginArea.style.display = 'none';
              userPanel.classList.add('show');
              showStatus('登录成功！', 'success');
            } else {
              throw new Error(result.error || '登录验证失败');
            }
          } catch (err) {
            console.error('Login error:', err);
            showStatus(err.message, 'error');
          }
        },
        fail: function(err) {
          console.error('LxLogin fail:', err);
          showStatus('扫码失败: ' + (err.error || err.message || '未知错误'), 'error');
        }
      });
    }

    function displayUserInfo(user) {
      // 头部
      document.getElementById('user-name').textContent = user.name || '-';
      document.getElementById('user-org').textContent = user.orgName || '-';

      // 头像
      const avatarIcon = document.getElementById('user-avatar-icon');
      const avatarImg = document.getElementById('user-avatar-img');

      if (user.avatarUrl) {
        avatarIcon.style.display = 'none';
        avatarImg.src = user.avatarUrl;
        avatarImg.style.display = 'block';
      } else {
        avatarIcon.style.display = 'flex';
        avatarIcon.textContent = getAvatarPlaceholder(user.name);
      }

      // 详细信息
      document.getElementById('user-id').textContent = user.staffId || '-';
      document.getElementById('user-orgname').textContent = user.orgName || '-';
      document.getElementById('user-dept').textContent = user.departments || '-';
      document.getElementById('user-mobile').textContent = user.mobile || '-';
      document.getElementById('user-email').textContent = user.email || '-';
      document.getElementById('user-employee').textContent = user.employeeNumber || '-';
      document.getElementById('user-loginname').textContent = user.loginName || '-';
      document.getElementById('user-status').innerHTML = '<span class="status-tag">' + (user.status || '已激活') + '</span>';

      console.log('登录用户:', user);
    }

    function logout() {
      userPanel.classList.remove('show');
      loginArea.style.display = 'block';

      document.getElementById('user-avatar-icon').style.display = 'flex';
      document.getElementById('user-avatar-img').style.display = 'none';

      document.getElementById('qrauth-container').innerHTML = '<div class="loading">重新加载...</div>';
      showStatus('');
      initLanxinLogin();
    }

    window.addEventListener('load', function() {
      initLanxinLogin();
    });
  </script>
</body>
</html>
