<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>蓝信单点登录 Demo</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      padding: 40px;
      max-width: 520px;
      width: 100%;
      text-align: center;
    }
    h1 {
      color: #333;
      margin-bottom: 10px;
      font-size: 24px;
    }
    .subtitle {
      color: #666;
      margin-bottom: 30px;
      font-size: 14px;
    }
    .badge {
      display: inline-block;
      background: #f0f2f5;
      color: #555;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 12px;
      margin: 2px;
    }

    /* 登录区域 */
    #login-area {
      margin: 30px 0;
    }
    #qrauth-container {
      width: 300px;
      height: 320px;
      margin: 0 auto;
      border: 1px solid #eee;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fafafa;
    }
    .loading { color: #666; font-size: 14px; }

    /* 用户信息面板 */
    #user-panel {
      display: none;
      text-align: left;
      padding: 20px;
      background: #f8f9ff;
      border-radius: 12px;
      margin-top: 20px;
    }
    #user-panel.show { display: block; animation: fadeIn 0.3s; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    /* 用户头像区域 */
    .user-header {
      display: flex;
      align-items: center;
      padding-bottom: 15px;
      border-bottom: 1px dashed #ddd;
      margin-bottom: 15px;
    }
    .user-avatar {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
      font-size: 24px;
      font-weight: bold;
      margin-right: 15px;
      overflow: hidden;
    }
    .user-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .user-header-info {
      flex: 1;
      text-align: left;
    }
    .user-header-name {
      font-size: 18px;
      font-weight: bold;
      color: #333;
      margin-bottom: 4px;
    }
    .user-header-org {
      font-size: 13px;
      color: #666;
    }

    /* 用户信息行 */
    .user-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      border-bottom: 1px dashed #eee;
    }
    .user-row:last-child { border-bottom: none; }
    .user-label {
      width: 80px;
      color: #666;
      font-size: 14px;
      display: flex;
      align-items: center;
    }
    .user-value {
      flex: 1;
      color: #333;
      font-weight: 500;
      font-size: 14px;
      text-align: left;
    }
    .user-value.break-all { word-break: break-all; }

    /* 状态标签 */
    .status-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 12px;
    }
    .status-active { background: #d4edda; color: #155724; }
    .status-inactive { background: #fff3cd; color: #856404; }
    .status-frozen { background: #cce5ff; color: #004085; }

    /* 签名区域 */
    .user-signature {
      background: #f0f2f5;
      padding: 10px 12px;
      border-radius: 8px;
      margin-top: 10px;
      font-size: 13px;
      color: #666;
      font-style: italic;
    }

    .btn {
      display: inline-block;
      background: #667eea;
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 8px;
      font-size: 14px;
      cursor: pointer;
      margin-top: 15px;
      transition: background 0.2s;
    }
    .btn:hover { background: #5568d3; }
    .btn-outline {
      background: transparent;
      border: 1px solid #667eea;
      color: #667eea;
    }
    .btn-outline:hover { background: #f0f2ff; }

    /* 状态提示 */
    #status {
      margin-top: 15px;
      font-size: 13px;
      min-height: 20px;
    }
    .status-error { color: #e74c3c; }
    .status-success { color: #27ae60; }

    /* 配置提示 */
    .config-notice {
      background: #d4edda;
      border: 1px solid #28a745;
      color: #155724;
      padding: 12px;
      border-radius: 8px;
      font-size: 12px;
      text-align: left;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>🔐 蓝信单点登录 Demo</h1>
    <div class="subtitle">
      <span class="badge">GitHub Pages</span>
      <span class="badge">HTTPS</span>
      <span class="badge">腾讯云函数</span>
    </div>

    <!-- 配置提示 -->
    <div class="config-notice">
      <strong>✅ 可信域名已配置</strong><br>
      展示丰富的用户基本信息
    </div>

    <!-- 登录区域 -->
    <div id="login-area">
      <div id="qrauth-container">
        <div class="loading">⏳ 正在加载二维码...</div>
      </div>
      <div id="status"></div>
    </div>

    <!-- 用户信息面板（登录成功后显示）-->
    <div id="user-panel">
      <h3 style="margin-bottom: 15px; color: #333;">✅ 登录成功</h3>

      <!-- 头像和基本信息 -->
      <div class="user-header">
        <div class="user-avatar" id="user-avatar-icon">?</div>
        <img id="user-avatar-img" src="" alt="头像" style="display: none;">
        <div class="user-header-info">
          <div class="user-header-name" id="user-name">-</div>
          <div class="user-header-org" id="user-org">-</div>
        </div>
      </div>

      <!-- 详细信息 -->
      <div class="user-row">
        <span class="user-label">🆔 人员ID</span>
        <span class="user-value break-all" id="user-id">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">🏢 组织</span>
        <span class="user-value" id="user-org-detail">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">🏠 部门</span>
        <span class="user-value" id="user-dept">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">⚧ 性别</span>
        <span class="user-value" id="user-gender">-</span>
      </div>
      <div class="user-row">
        <span class="user-label">📊 状态</span>
        <span class="user-value" id="user-status">-</span>
      </div>

      <!-- 签名 -->
      <div class="user-signature" id="user-signature" style="display: none;">
        <span id="user-signature-text"></span>
      </div>

      <button class="btn btn-outline" onclick="logout()" style="width: 100%;">🔄 重新登录</button>
    </div>

    <!-- 操作按钮 -->
    <div style="margin-top: 30px;">
      <button class="btn" onclick="location.reload()">🔄 刷新页面</button>
    </div>
  </div>

  <!-- 蓝信 JSSDK -->
  <script src="https://user-stage.e.lanxin.cn/user/passport/qrauth/static/login-jssdk.js"></script>

  <script>
    // ================= 配置区域 =================

    // 腾讯云函数地址
    const BACKEND_URL = 'https://1422359745-233asqikpd.ap-guangzhou.tencentscf.com';

    // 蓝信应用配置
    const LANXIN_CONFIG = {
      oauthUrl: 'https://user-stage.e.lanxin.cn/user/passport/qrauth',
      appId: 9183488,
      orgId: 14803712,
      redirectUri: window.location.href.split('?')[0]
    };

    // ================= 业务逻辑 =================

    const statusEl = document.getElementById('status');
    const loginArea = document.getElementById('login-area');
    const userPanel = document.getElementById('user-panel');

    // 显示状态消息
    function showStatus(msg, type = 'info') {
      statusEl.textContent = msg;
      statusEl.className = type === 'error' ? 'status-error' :
                          type === 'success' ? 'status-success' : '';
    }

    // 状态标签样式
    function getStatusTag(status) {
      if (status === '已激活') return '<span class="status-tag status-active">已激活</span>';
      if (status === '未激活') return '<span class="status-tag status-inactive">未激活</span>';
      if (status === '已冻结') return '<span class="status-tag status-frozen">已冻结</span>';
      return status;
    }

    // 获取姓名首字母作为头像占位符
    function getAvatarPlaceholder(name) {
      if (!name) return '?';
      return name.charAt(0).toUpperCase();
    }

    // 初始化蓝信扫码登录
    function initLanxinLogin() {
      if (typeof LxLogin !== 'function') {
        showStatus('❌ 蓝信 SDK 加载失败，请检查网络', 'error');
        console.error('LxLogin not found.');
        return;
      }

      console.log('初始化蓝信扫码登录，配置：', LANXIN_CONFIG);

      // 清空之前的loading状态
      const container = document.getElementById('qrauth-container');
      container.innerHTML = '';

      LxLogin({
        oauthUrl: LANXIN_CONFIG.oauthUrl,
        appId: LANXIN_CONFIG.appId,
        orgId: LANXIN_CONFIG.orgId,
        redirectUri: LANXIN_CONFIG.redirectUri,
        containerId: 'qrauth-container',
        success: async function(res) {
          const { code } = res;
          showStatus('⏳ 正在验证登录...', 'info');

          try {
            // 调用云函数后端
            const response = await fetch(BACKEND_URL, {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({ code })
            });

            const result = await response.json();

            if (result.success) {
              // 登录成功，显示用户信息
              displayUserInfo(result.user);

              // 切换 UI
              loginArea.style.display = 'none';
              userPanel.classList.add('show');
              showStatus('✅ 登录成功！', 'success');

            } else {
              throw new Error(result.error || '登录验证失败');
            }
          } catch (err) {
            console.error('Login error:', err);
            showStatus(`❌ ${err.message}`, 'error');
          }
        },
        fail: function(err) {
          console.error('LxLogin fail:', err);
          showStatus(`❌ 扫码失败: ${err.error || err.message || '未知错误'}`, 'error');
        }
      });
    }

    // 显示用户信息
    function displayUserInfo(user) {
      // 头部信息
      document.getElementById('user-name').textContent = user.name || '-';
      document.getElementById('user-org').textContent = user.orgName || '-';

      // 头像处理
      const avatarIcon = document.getElementById('user-avatar-icon');
      const avatarImg = document.getElementById('user-avatar-img');

      if (user.avatarUrl) {
        avatarIcon.style.display = 'none';
        avatarImg.src = user.avatarUrl;
        avatarImg.style.display = 'block';
      } else {
        avatarIcon.style.display = 'flex';
        avatarIcon.textContent = getAvatarPlaceholder(user.name);
      }

      // 详细信息
      document.getElementById('user-id').textContent = user.staffId || '-';
      document.getElementById('user-org-detail').textContent = user.orgName || '-';
      document.getElementById('user-dept').textContent = user.departments || '-';
      document.getElementById('user-gender').textContent = user.gender || '-';
      document.getElementById('user-status').innerHTML = getStatusTag(user.status);

      // 签名
      if (user.signature) {
        document.getElementById('user-signature-text').textContent = `"${user.signature}"`;
        document.getElementById('user-signature').style.display = 'block';
      } else {
        document.getElementById('user-signature').style.display = 'none';
      }

      console.log('🎉 登录用户:', user);
    }

    // 退出登录
    function logout() {
      userPanel.classList.remove('show');
      loginArea.style.display = 'block';

      // 重置头像显示
      document.getElementById('user-avatar-icon').style.display = 'flex';
      document.getElementById('user-avatar-img').style.display = 'none';

      document.getElementById('qrauth-container').innerHTML = '<div class="loading">⏳ 重新加载...</div>';
      showStatus('');
      initLanxinLogin();
    }

    // 页面加载完成后初始化
    window.addEventListener('load', function() {
      initLanxinLogin();
    });
  </script>
</body>
</html>
